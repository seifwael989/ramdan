<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>💖 أسئلة صغيرة</title>
<link href="https://fonts.googleapis.com/css2?family=Reem+Kufi+Ink&display=swap" rel="stylesheet">
<style>
body{
margin:0;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
font-family:'Reem Kufi Ink',sans-serif;
padding:25px;
}

.card{
background:rgba(255,255,255,0.95);
padding:40px 30px;
border-radius:25px;
max-width:600px;
width:90%;
box-shadow:0 15px 40px rgba(0,0,0,.15);
animation:fadeIn 1s ease;
text-align:center;
}

h1{color:#ff4d88;margin-bottom:25px}

.question{
margin:18px 0;
}

input{
width:100%;
padding:12px;
border-radius:10px;
border:2px solid #ffb6c1;
text-align:center;
font-size:18px;
font-family:'Reem Kufi Ink',sans-serif;
color:#ff4d88;
outline:none;
}

button{
margin-top:25px;
background:linear-gradient(90deg,#ff6b81,#ff4d6d);
border:none;
color:white;
padding:12px 30px;
border-radius:12px;
font-size:18px;
cursor:pointer;
transition:.3s;
font-family:'Reem Kufi Ink',sans-serif;
}

button:hover{transform:scale(1.08)}

@keyframes fadeIn{
from{opacity:0;transform:translateY(20px)}
to{opacity:1;transform:translateY(0)}
}
</style>
</head>
<body>

<div class="card">
<h1>جاوبي على شوية أسئلة صغيرة 💖</h1>

<div class="question">1) أكتر حاجة بتحبيها فيّ؟</div>
<input type="text" placeholder="اكتبي هنا..." />

<div class="question">2) إيه الحاجة اللي بتخليكي سعيدة؟</div>
<input type="text" placeholder="اكتبي هنا..." />

<div class="question">3) كلمة واحدة بس ليا ❤️</div>
<input type="text" placeholder="اكتبي هنا..." />

<button onclick="finish()">خلصت 💞</button>
</div>

<script>
function finish(){
  alert('اجابات منطقية جداً لسا هشوفها بس اكيد منطقية 😏❤️');
  window.location.href='love.html';
}
</script>

</body>
</html>
